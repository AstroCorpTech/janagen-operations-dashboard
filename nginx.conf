server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security & cache headers — declared at server level only.
    # Because no `location` block below uses `add_header` (except /health which
    # explicitly opts out), these are inherited cleanly. Avoids the well-known
    # nginx gotcha where any per-location add_header drops server-level headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;

    auth_basic "JANAGEN Operations";
    auth_basic_user_file /etc/nginx/.htpasswd;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck — Coolify/Docker probe this. No auth, no logs.
    # `default_type` invokes no add_header, so server-level headers still inherit.
    location = /health {
        auth_basic off;
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
